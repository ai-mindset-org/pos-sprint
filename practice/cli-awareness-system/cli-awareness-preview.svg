  <!-- STATUS LINE — Level 1 (bottom bar) -->
  <!-- ═══════════════════════════════════════ -->

  <rect y="440" width="760" height="4" fill="#21262d"/>
  <rect y="444" width="760" height="40" fill="url(#statusgrad)"/>

