  <text x="404" y="282" font-family="'JetBrains Mono', monospace" font-size="10" fill="#6e7681">инструкция в CLAUDE.md</text>
  <text x="404" y="300" font-family="'JetBrains Mono', monospace" font-size="10" fill="#6e7681">ctx + eval + поведение по порогам</text>
  <text x="404" y="316" font-family="'JetBrains Mono', monospace" font-size="10" fill="#484f58">⬤○○ 3 мин</text>

