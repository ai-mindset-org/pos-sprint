<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&amp;display=swap');
    </style>
    <linearGradient id="titlebar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d2d2d"/>
      <stop offset="100%" stop-color="#1e1e1e"/>
    </linearGradient>
    <linearGradient id="statusgrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Window frame -->
  <rect width="760" height="520" rx="10" fill="#0d1117"/>
  <rect width="760" height="36" rx="10" fill="url(#titlebar)"/>
  <rect y="26" width="760" height="10" fill="url(#titlebar)"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>

  <!-- Title -->
  <text x="380" y="22" font-family="'JetBrains Mono', monospace" font-size="12" fill="#8b949e" text-anchor="middle">claude — notes</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- RESPONSE AREA -->
  <!-- ═══════════════════════════════════════ -->

  <!-- Response text -->
  <text x="24" y="64" font-family="'JetBrains Mono', monospace" font-size="12" fill="#8b949e">❯ сделай summary встречи и отправь в телеграм</text>

  <text x="24" y="96" font-family="'JetBrains Mono', monospace" font-size="13" fill="#c9d1d9">Готово — summary отправлен в Saved Messages.</text>
  <text x="24" y="116" font-family="'JetBrains Mono', monospace" font-size="13" fill="#c9d1d9">3 action items, 2 решения, 1 open question.</text>

  <!-- Separator -->
  <line x1="24" y1="136" x2="736" y2="136" stroke="#21262d" stroke-width="1"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- FOOTER — Level 2: Response Footer -->
  <!-- ═══════════════════════════════════════ -->

  <text x="24" y="160" font-family="'JetBrains Mono', monospace" font-size="12.5" fill="#7ee787">◇</text>
  <text x="40" y="160" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6e7681">ctx:</text>
  <text x="72" y="160" font-family="'JetBrains Mono', monospace" font-size="12" fill="#c9d1d9">96K</text>
  <text x="104" y="160" font-family="'JetBrains Mono', monospace" font-size="12" fill="#484f58">|</text>
  <text x="116" y="160" font-family="'JetBrains Mono', monospace" font-size="12" fill="#c9d1d9">104K left</text>
  <text x="208" y="160" font-family="'JetBrains Mono', monospace" font-size="12" fill="#484f58">|</text>
  <text x="220" y="160" font-family="'JetBrains Mono', monospace" font-size="12" fill="#c9d1d9">48%</text>
  <text x="260" y="160" font-family="'JetBrains Mono', monospace" font-size="12" fill="#484f58">|</text>
  <text x="274" y="160" font-family="'JetBrains Mono', monospace" font-size="12" fill="#7ee787">●</text>

  <!-- Eval line -->
  <text x="24" y="182" font-family="'JetBrains Mono', monospace" font-size="12.5" fill="#484f58">▫</text>
  <text x="40" y="182" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6e7681">eval:</text>
  <text x="84" y="182" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6e7681">T:</text>
  <text x="102" y="182" font-family="'JetBrains Mono', monospace" font-size="12" fill="#7ee787">✓</text>
  <text x="120" y="182" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6e7681">R:</text>
  <text x="138" y="182" font-family="'JetBrains Mono', monospace" font-size="12" fill="#7ee787">✓</text>
  <text x="156" y="182" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6e7681">C:</text>
  <text x="174" y="182" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6e7681">○</text>

