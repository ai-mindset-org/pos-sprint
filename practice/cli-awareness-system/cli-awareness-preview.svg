  <text x="40" y="282" font-family="'JetBrains Mono', monospace" font-size="10" fill="#6e7681">bash-скрипт в ~/.claude/statusline.sh</text>
  <text x="40" y="300" font-family="'JetBrains Mono', monospace" font-size="10" fill="#6e7681">обновляется каждый ход, видна внизу терминала</text>
