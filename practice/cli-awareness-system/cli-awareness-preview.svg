  <text x="404" y="356" font-family="'JetBrains Mono', monospace" font-size="10" fill="#79c0ff" font-weight="600">LEVEL 4  Mission Control</text>
  <text x="404" y="374" font-family="'JetBrains Mono', monospace" font-size="10" fill="#6e7681">statusline → JSON → iTerm2/tmux</text>
  <text x="404" y="392" font-family="'JetBrains Mono', monospace" font-size="10" fill="#6e7681">видно даже при скролле</text>
  <text x="404" y="408" font-family="'JetBrains Mono', monospace" font-size="10" fill="#484f58">⬤⬤⬤ 30 мин</text>

