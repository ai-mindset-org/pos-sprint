  <text x="40" y="374" font-family="'JetBrains Mono', monospace" font-size="10" fill="#6e7681">SessionStart hook + memory file</text>
  <text x="40" y="392" font-family="'JetBrains Mono', monospace" font-size="10" fill="#6e7681">Linear / Jira / Todoist → footer</text>
  <text x="40" y="408" font-family="'JetBrains Mono', monospace" font-size="10" fill="#484f58">⬤⬤○ 15 мин</text>

  <!-- Level 4 -->
