  <text x="42" y="470" font-family="'JetBrains Mono', monospace" font-size="12" fill="#c9d1d9">notes</text>
  <text x="90" y="470" font-family="'JetBrains Mono', monospace" font-size="12" fill="#30363d">│</text>
  <text x="102" y="470" font-family="'JetBrains Mono', monospace" font-size="12" fill="#ffa657">◆</text>
  <text x="118" y="470" font-family="'JetBrains Mono', monospace" font-size="12" fill="#c9d1d9">Opus 4.6</text>
  <text x="210" y="470" font-family="'JetBrains Mono', monospace" font-size="12" fill="#30363d">│</text>

  <!-- Context bar -->
  <text x="224" y="470" font-family="'JetBrains Mono', monospace" font-size="12" fill="#7ee787">▰▰▰▰▰</text>
  <text x="290" y="470" font-family="'JetBrains Mono', monospace" font-size="12" fill="#30363d">▱▱▱▱▱</text>
  <text x="358" y="470" font-family="'JetBrains Mono', monospace" font-size="12" fill="#c9d1d9">48%</text>
  <text x="398" y="470" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6e7681">◇68k</text>

  <text x="448" y="470" font-family="'JetBrains Mono', monospace" font-size="12" fill="#30363d">│</text>
  <text x="462" y="470" font-family="'JetBrains Mono', monospace" font-size="12" fill="#d2a8ff">◐AIM-2054</text>

  <text x="564" y="470" font-family="'JetBrains Mono', monospace" font-size="12" fill="#30363d">│</text>
  <text x="578" y="470" font-family="'JetBrains Mono', monospace" font-size="12" fill="#58a6ff">◈</text>
  <text x="594" y="470" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6e7681">POS guide…</text>

  <text x="692" y="470" font-family="'JetBrains Mono', monospace" font-size="12" fill="#30363d">│</text>
  <text x="706" y="470" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6e7681">11m</text>

  <!-- Bottom round corners -->
  <rect y="484" width="760" height="36" rx="0" fill="#0d1117"/>
  <rect y="484" width="760" height="36" rx="10" fill="#0d1117"/>

  <!-- Label: Status Line -->
  <text x="380" y="506" font-family="'JetBrains Mono', monospace" font-size="9" fill="#30363d" text-anchor="middle">▲ STATUS LINE — обновляется каждый ход Claude Code</text>
