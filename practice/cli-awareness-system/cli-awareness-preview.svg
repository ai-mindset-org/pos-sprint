  <line x1="720" y1="148" x2="720" y2="210" stroke="#30363d" stroke-width="1.5"/>
  <line x1="716" y1="148" x2="720" y2="148" stroke="#30363d" stroke-width="1.5"/>
  <line x1="716" y1="210" x2="720" y2="210" stroke="#30363d" stroke-width="1.5"/>
