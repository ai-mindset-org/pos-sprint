  <text x="196" y="204" font-family="'JetBrains Mono', monospace" font-size="12" fill="#c9d1d9">BOS speakers</text>
  <text x="312" y="204" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6e7681">·</text>
  <text x="324" y="204" font-family="'JetBrains Mono', monospace" font-size="12" fill="#d2a8ff">◐ IP</text>
  <text x="372" y="204" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6e7681">→</text>
  <text x="388" y="204" font-family="'JetBrains Mono', monospace" font-size="12" fill="#ffa657">/linear-action AIM-2054 update</text>

